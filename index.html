<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LCD Ocean Catcher 1984</title>
    <style>
        :root {
            --lcd-bg: #a4b08d;
            --lcd-ink: rgba(30, 35, 30, 0.9);
            --lcd-ghost: rgba(30, 35, 30, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #222;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: sans-serif;
        }

        /* Fullscreen Game Console */
        #console {
            background-color: #c0392b;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            border: 10px solid #a93226; box-sizing: border-box;
            position: relative;
        }

        /* LCD Screen Area */
        #screen {
            flex: 1;
            background-color: var(--lcd-bg);
            margin: 20px;
            border: 15px solid #333;
            border-radius: 10px;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
        }

        #score-display {
            position: absolute; top: 10px; right: 20px;
            font-size: 32px; font-weight: bold; color: var(--lcd-ink);
            font-family: 'Courier New', monospace;
        }

        /* Characters & Elements */
        .sprite {
            position: absolute;
            color: var(--lcd-ink);
            font-weight: bold;
            transition: all 0.1s steps(1); /* Typischer LCD Sprung-Effekt */
            white-space: nowrap;
        }

        #fisher { font-size: 60px; bottom: 110px; z-index: 10; }
        #basket { font-size: 40px; bottom: 110px; left: 50%; transform: translateX(-50%); }
        #pier { position: absolute; bottom: 110px; width: 100%; height: 4px; background: var(--lcd-ink); }
        
        .fish { font-size: 30px; bottom: 40px; }
        .bird { font-size: 45px; top: 20px; }

        /* Controls */
        .controls {
            height: 25%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #a93226;
            padding-bottom: 20px;
        }

        .btn {
            width: 80px; height: 80px;
            background: #333; border-radius: 50%;
            color: white; font-weight: bold;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 0 #111;
            cursor: pointer; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #111; }
        .btn-action { width: 100px; height: 100px; background: #222; font-size: 1.2em; }

        .label { color: #eee; font-size: 12px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div id="console">
    <div id="screen">
        <div id="score-display">00</div>
        <div id="pier"></div>
        <div id="basket">🧺</div>
        <div id="fisher" class="sprite">🎣</div>
        <div id="elements-layer"></div>
    </div>

    <div class="controls">
        <div onclick="move(-1)">
            <div class="btn">LEFT</div>
        </div>
        <div onclick="action()">
            <div class="btn btn-action">CATCH</div>
        </div>
        <div onclick="move(1)">
            <div class="btn">RIGHT</div>
        </div>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    const fisher = document.getElementById('fisher');
    const scoreEl = document.getElementById('score-display');
    const elementsLayer = document.getElementById('elements-layer');

    let pos = 0; // 0 bis 7
    let score = 0;
    let heldFish = null;
    let fishArray = [];
    let birdPos = -100; // Startet außerhalb
    let birdTarget = 50; // Mitte
    
    // Audio Context für Retro-Klicks
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playClick(freq = 150, duration = 0.05) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function move(dir) {
        pos = Math.max(0, Math.min(7, pos + dir));
        playClick(200);
        updateFisher();
    }

    function updateFisher() {
        const xPercent = (pos * 12.5) + 6;
        fisher.style.left = xPercent + "%";
        fisher.innerText = heldFish ? "👨‍🎨🐟" : "🎣";
    }

    function action() {
        playClick(400);
        
        // 1. Am Korb abgeben (Korb ist bei pos 3 oder 4)
        if ((pos === 3 || pos === 4) && heldFish) {
            score++;
            heldFish = null;
            playClick(600, 0.2);
        } 
        // 2. Fisch fangen
        else if (!heldFish) {
            checkCatch();
        }
        // 3. Vogel verscheuchen
        if ((pos === 3 || pos === 4) && birdPos > 40 && birdPos < 60) {
            birdPos = -100;
            playClick(100, 0.3);
        }
        
        updateFisher();
        scoreEl.innerText = score.toString().padStart(2, '0');
    }

    function checkCatch() {
        const fisherX = (pos * 12.5) + 6;
        fishArray.forEach((fish, index) => {
            if (Math.abs(fish.x - fisherX) < 8) {
                heldFish = fish.type;
                fish.el.remove();
                fishArray.splice(index, 1);
                playClick(800, 0.1);
            }
        });
    }

    // Fisch-Management
    function spawnFish() {
        if (fishArray.length < 3) {
            const el = document.createElement('div');
            el.className = 'sprite fish';
            el.innerText = '🐟';
            elementsLayer.appendChild(el);
            fishArray.push({ x: 100, y: Math.random() > 0.5 ? 40 : 10, el: el, type: 'standard' });
        }
    }

    function updateGame() {
        // Fische bewegen
        fishArray.forEach((fish, i) => {
            fish.x -= 1.5; // Geschwindigkeit
            fish.el.style.left = fish.x + "%";
            fish.el.style.bottom = fish.y + "px";
            if (fish.x < -10) {
                fish.el.remove();
                fishArray.splice(i, 1);
            }
        });

        // Vogel bewegen
        if (birdPos < -50 && Math.random() > 0.99) birdPos = 110;
        if (birdPos > -60) {
            birdPos -= 0.5;
            if (!document.getElementById('bird')) {
                const b = document.createElement('div');
                b.id = 'bird'; b.className = 'sprite bird'; b.innerText = '🦅';
                elementsLayer.appendChild(b);
            }
            const bEl = document.getElementById('bird');
            bEl.style.left = birdPos + "%";
            
            // Vogel klaut Fisch
            if (Math.abs(birdPos - 50) < 2 && score > 0) {
                score--;
                birdPos = -100;
                scoreEl.innerText = score.toString().padStart(2, '0');
                alert("Der Reiher hat einen Fisch geklaut!");
            }
        } else {
            if (document.getElementById('bird')) document.getElementById('bird').remove();
        }

        if (score >= 10) {
            alert("GEWONNEN!");
            score = 0;
        }

        requestAnimationFrame(updateGame);
    }

    // Start
    updateFisher();
    setInterval(spawnFish, 2000);
    updateGame();
</script>

</body>
</html>
